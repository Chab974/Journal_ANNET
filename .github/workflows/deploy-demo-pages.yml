name: Deploy Journal ANNET demo to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      event_type:
        description: "Notion event type"
        required: false
        type: string
      event_id:
        description: "Notion event id"
        required: false
        type: string
      entity_id:
        description: "Notion entity id"
        required: false
        type: string
      event_timestamp:
        description: "Notion event timestamp"
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: journal-annet-pages-demo
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Stabilize Notion webhook burst
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.event_type != '' }}
        run: sleep 20

      - name: Run automated tests
        run: npm test

      - name: Sync snapshots and build demo site
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PUBLICATIONS_DATA_SOURCE_ID: ${{ secrets.NOTION_PUBLICATIONS_DATA_SOURCE_ID }}
          NOTION_AGENDA_DATA_SOURCE_ID: ${{ secrets.NOTION_AGENDA_DATA_SOURCE_ID }}
          NOTION_MENU_ITEMS_DATA_SOURCE_ID: ${{ secrets.NOTION_MENU_ITEMS_DATA_SOURCE_ID }}
          NOTION_SITE_SECTIONS_DATA_SOURCE_ID: ${{ secrets.NOTION_SITE_SECTIONS_DATA_SOURCE_ID }}
          NOTION_SITE_SECTION_ITEMS_DATA_SOURCE_ID: ${{ secrets.NOTION_SITE_SECTION_ITEMS_DATA_SOURCE_ID }}
          SITE_DEPLOY_TARGET: github-pages-demo
          SITE_PATH_PREFIX: /Journal_ANNET/
          SITE_TIME_ZONE: Europe/Paris
        run: npm run build:pages-demo

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
